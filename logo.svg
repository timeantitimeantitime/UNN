<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#5B9BD5" stroke="#2E75B6" stroke-width="2"/>
  
  <!-- Globe lines -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8">
    <!-- Horizontal lines -->
    <ellipse cx="100" cy="100" rx="80" ry="30"/>
    <ellipse cx="100" cy="100" rx="80" ry="60"/>
    <ellipse cx="100" cy="100" rx="80" ry="80"/>
    
    <!-- Vertical lines -->
    <ellipse cx="100" cy="100" rx="30" ry="80"/>
    <ellipse cx="100" cy="100" rx="60" ry="80"/>
  </g>
  
  <!-- Network nodes -->
  <g fill="#FFFFFF">
    <circle cx="100" cy="50" r="6"/>
    <circle cx="150" cy="100" r="6"/>
    <circle cx="100" cy="150" r="6"/>
    <circle cx="50" cy="100" r="6"/>
    <circle cx="75" cy="75" r="5"/>
    <circle cx="125" cy="75" r="5"/>
    <circle cx="125" cy="125" r="5"/>
    <circle cx="75" cy="125" r="5"/>
  </g>
  
  <!-- Network connections -->
  <g stroke="#FFFFFF" stroke-width="2" opacity="0.9">
    <line x1="100" y1="50" x2="150" y2="100"/>
    <line x1="150" y1="100" x2="100" y2="150"/>
    <line x1="100" y1="150" x2="50" y2="100"/>
    <line x1="50" y1="100" x2="100" y2="50"/>
    <line x1="75" y1="75" x2="125" y2="75"/>
    <line x1="125" y1="75" x2="125" y2="125"/>
    <line x1="125" y1="125" x2="75" y2="125"/>
    <line x1="75" y1="125" x2="75" y2="75"/>
    <line x1="100" y1="50" x2="75" y2="75"/>
    <line x1="100" y1="50" x2="125" y2="75"/>
    <line x1="150" y1="100" x2="125" y2="75"/>
    <line x1="150" y1="100" x2="125" y2="125"/>
    <line x1="100" y1="150" x2="125" y2="125"/>
    <line x1="100" y1="150" x2="75" y2="125"/>
    <line x1="50" y1="100" x2="75" y2="125"/>
    <line x1="50" y1="100" x2="75" y2="75"/>
  </g>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#2E75B6" stroke-width="3"/>
</svg>